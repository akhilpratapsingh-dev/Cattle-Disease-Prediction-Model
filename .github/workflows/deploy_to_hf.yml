name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main   # Triggers on every push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true  # Important for large files like .h5 models

      - name: Install Git LFS
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy-bot@github.com"
          git config --global user.name "GitHub Deploy Bot"

          # Clone the HF Space (with LFS support)
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/${{ secrets.HF_SPACE_NAME }} hf_space
          cd hf_space

          # Enable LFS and track large file types
          git lfs install
          git lfs track "*.h5"
          git lfs track "*.pkl"
          git lfs track "*.pb"
          git lfs track "variables.data-*"
          git lfs track "variables.index"
          git add .gitattributes

          cd ..

          # Copy runtime files only — exclude training/dev-only files
          rsync -av \
            --exclude='.git' \
            --exclude='env/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='dataset.csv' \
            --exclude='final_confusion_matrix.png' \
            --exclude='predict.py' \
            --exclude='runtime.txt' \
            ./ hf_space/

          # Commit and push (LFS handles large files automatically)
          cd hf_space
          git add .
          git diff --cached --quiet || git commit -m "Auto-deploy from GitHub Actions: ${{ github.sha }}"
          git push
